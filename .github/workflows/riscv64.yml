name: RISCV64

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release

jobs:
  build_linux:
    strategy:
      matrix:
        platform: [ linux ]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:

      - name: Checkout dynarmic repo
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev gcc-14-riscv64-linux-gnu g++-14-riscv64-linux-gnu ninja-build qemu-user

      - name: Ccache
        if: matrix.platform == 'linux'
        uses: hendrikmuhs/ccache-action@v1.2.23

      - name: Configure CMake for RISCV64 (Linux)
        if: matrix.platform == 'linux'
        env:
          CC: riscv64-linux-gnu-gcc-14
          CXX: riscv64-linux-gnu-g++-14
        run: >
          cmake
          -B ${{github.workspace}}/build-riscv64
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DDYNARMIC_TESTS_USE_UNICORN=0
          -DDYNARMIC_USE_LLVM=0
          -DDYNARMIC_FRONTENDS=A32
          -G Ninja

      - name: Build RISCV64
        working-directory: ${{github.workspace}}/build-riscv64
        run: cmake --build . --config Release

      # - name: Basic tests
      #   if: matrix.platform == 'linux'
      #   working-directory: ${{github.workspace}}
