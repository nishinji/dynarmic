name: x86-64

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
        cpu_detection: [ 0, 1 ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout dynarmic repo
        uses: actions/checkout@v5

      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev llvm ninja-build

      - name: Install build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install boost llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Install build dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          curl -L -o boost.7z https://archives.boost.io/release/1.88.0/source/boost_1_88_0.7z
          7z x boost.7z -oC:\boost > $null

      - name: Checkout unicorn repo
        if: ${{matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'}}
        uses: actions/checkout@v5
        with:
          repository: unicorn-engine/unicorn
          ref: 2.1.4
          path: externals/unicorn

      - name: Build unicorn
        if: ${{ matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest' }}
        run: |
          cmake -S externals/unicorn \
                -B externals/unicorn/build \
                -DCMAKE_BUILD_TYPE=Release \
                -DUNICORN_ARCH="arm;aarch64"

          cmake --build externals/unicorn/build --parallel

      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          CC: gcc-14
          CXX: g++-14
          CXXFLAGS: -Wp,-D_GLIBCXX_ASSERTIONS
        run: >
          cmake
          -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DDYNARMIC_ENABLE_CPU_FEATURE_DETECTION=${{matrix.cpu_detection}}
          -DDYNARMIC_TESTS_USE_UNICORN=1
          -DDYNARMIC_USE_LLVM=1
          -DLIBUNICORN_INCLUDE_DIR=${{github.workspace}}/externals/unicorn/include
          -DLIBUNICORN_LIBRARY=${{github.workspace}}/externals/unicorn/build/libunicorn.a
          -G Ninja

      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: >
          cmake
          -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DDYNARMIC_ENABLE_CPU_FEATURE_DETECTION=${{matrix.cpu_detection}}
          -DDYNARMIC_TESTS_USE_UNICORN=1
          -DDYNARMIC_USE_LLVM=1
          -DLIBUNICORN_INCLUDE_DIR=${{github.workspace}}/externals/unicorn/include
          -DLIBUNICORN_LIBRARY=${{github.workspace}}/externals/unicorn/build/libunicorn.a
          -G Ninja

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: >
          cmake
          -B ${{github.workspace}}/build
          -DBoost_INCLUDE_DIR=C:/boost/boost_1_88_0
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DDYNARMIC_ENABLE_CPU_FEATURE_DETECTION=${{matrix.cpu_detection}}
          -G "Visual Studio 17 2022"
          -A x64

      - name: Build
        working-directory: ${{github.workspace}}/build
        run: cmake --build . --config Release

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest --extra-verbose -C ${{env.BUILD_TYPE}}
